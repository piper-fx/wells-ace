<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wells Fargo - Transaction History</title>
    <style>
        /* --- CSS Reset & Variables (Same as Dashboard) --- */
        :root {
            --wf-red: #d71e28;
            --wf-black: #1f1f1f;
            --wf-white: #ffffff;
            --wf-gray-text: #5c5c5c;
            --wf-gray-label: #5e5e5e;
            
            --wf-bg-gradient-start: #9e95a7; 
            --wf-bg-gradient-mid: #dcd0d9;   
            --wf-bg-gradient-end: #fdfbf9;   
            
            --wf-card-shadow: 0 2px 6px rgba(0,0,0,0.08);
            --wf-btn-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, var(--wf-bg-gradient-start) 0%, var(--wf-bg-gradient-mid) 40%, var(--wf-bg-gradient-end) 100%);
            color: var(--wf-black);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* --- Header Section --- */
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0.8rem 1.25rem;
            height: 60px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .sign-off-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.85rem;
            gap: 0.3rem;
            font-weight: 600;
        }
        
        .sign-off-link svg {
            fill: #1a1a1a;
        }

        /* --- Main Content --- */
        .main-content {
            padding: 0 1rem 1.5rem;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 300;
            margin: 1rem 0 1.5rem 0.25rem;
            color: #222;
        }

        /* --- Transaction List Card --- */
        .transaction-card {
            background-color: var(--wf-white);
            border-radius: 10px;
            padding: 0; 
            box-shadow: var(--wf-card-shadow);
            overflow: hidden;
            min-height: 100px;
        }

        .tx-header {
            padding: 1rem 1.25rem;
            background-color: #f9f9f9;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            font-size: 0.95rem;
            color: #444;
            border-top: 1px solid #eee;
        }
        
        .tx-header:first-child {
            border-top: none;
        }

        .tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .tx-item:last-child {
            border-bottom: none;
        }

        .tx-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tx-desc {
            font-weight: 600;
            font-size: 0.95rem;
            color: #000;
        }

        .tx-date {
            font-size: 0.8rem;
            color: #666;
        }

        .tx-amount {
            font-weight: 400;
            font-size: 1rem;
            color: #000;
        }

        .tx-amount.credit {
            color: #1e8e3e; /* Green for deposits */
            font-weight: 600;
        }
        
        .empty-state {
            padding: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.95rem;
        }

        /* --- Bottom Navigation Bar --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #fdfdfd;
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0.5rem 1rem; 
            box-shadow: 0 -1px 4px rgba(0,0,0,0.05);
            z-index: 100;
            border-top: 1px solid #eee;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #757575;
            font-size: 0.7rem;
            gap: 4px;
            font-weight: 500;
            width: 20%;
            padding-top: 4px;
        }

        .nav-item.active {
            color: #d71e28;
        }
        
        .nav-item svg {
            stroke-width: 1.5px;
        }
        
        .nav-item.active svg {
            fill: #d71e28;
            stroke: #d71e28;
        }
        
        .nav-item.active svg path {
            fill: #d71e28;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-actions">
            <a href="index.html" class="sign-off-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C9.243 2 7 4.243 7 7v3H6c-1.103 0-2 .897-2 2v8c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-8c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zm0 2c1.654 0 3 1.346 3 3v3H9V7c0-1.654 1.346-3 3-3zm-4 7h8v8H8v-8zm4 2c-1.103 0-2 .897-2 2s.897 2 2 2 2-.897 2-2-.897-2-2-2z"/>
                </svg>
                Sign off
            </a>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Transaction History</h1>

        <div class="transaction-card" id="transactionsList">
            <div class="empty-state">Loading transactions...</div>
        </div>

    </main>

    <nav class="bottom-nav">
        <a href="user-dashboard.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            </svg>
            <span>Accounts</span>
        </a>
        <a href="#" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 19V5M5 12l7-7 7 7"/>
                <path d="M5 17l7 5 7-5"/>
            </svg>
            <span>Deposit</span>
        </a>
        <a href="transfer-page.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <text x="12" y="16" text-anchor="middle" font-size="16" font-weight="bold">$</text>
                <circle cx="12" cy="12" r="9"></circle>
            </svg>
            <span>Pay & Transfer</span>
        </a>
        <a href="#" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
            </svg>
            <span>Explore</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
            <span>Menu</span>
        </a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userId = sessionStorage.getItem('userId');
            if (!userId) { window.location.href = 'login.html'; return; }

            const listContainer = document.getElementById('transactionsList');

            try {
                const response = await fetch(`/api/user-transactions?userId=${userId}`);
                const data = await response.json();

                if (!data.success || data.transactions.length === 0) {
                    listContainer.innerHTML = '<div class="empty-state">No recent transactions</div>';
                    return;
                }

                listContainer.innerHTML = ''; // Clear loading/empty state
                let lastDate = '';

                data.transactions.forEach(tx => {
                    // Format Date (e.g., "Oct 24, 2023")
                    const dateObj = new Date(tx.date);
                    const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                    // Insert Header if Date Changed
                    if (dateStr !== lastDate) {
                        const header = document.createElement('div');
                        header.className = 'tx-header';
                        header.textContent = dateStr;
                        listContainer.appendChild(header);
                        lastDate = dateStr;
                    }

                    // Determine Credit/Debit Styles
                    const isCredit = tx.type === 'credit';
                    const amountClass = isCredit ? 'tx-amount credit' : 'tx-amount';
                    const sign = isCredit ? '+' : '-';
                    const formattedAmount = `${sign}$${parseFloat(tx.amount).toFixed(2)}`;

                    // Create Item
                    const item = document.createElement('div');
                    item.className = 'tx-item';
                    item.innerHTML = `
                        <div class="tx-info">
                            <span class="tx-desc">${tx.description}</span>
                            <span class="tx-date">Acct: ...${tx.accountNumber.slice(-4)}</span>
                        </div>
                        <div class="${amountClass}">${formattedAmount}</div>
                    `;
                    listContainer.appendChild(item);
                });

            } catch (err) {
                console.error(err);
                listContainer.innerHTML = '<div class="empty-state">Unable to load transactions</div>';
            }
        });
    </script>

</body>
</html>
