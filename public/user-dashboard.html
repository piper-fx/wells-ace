<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wells Fargo - Dashboard</title>
    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --wf-red: #d71e28;
            --wf-black: #1f1f1f;
            --wf-white: #ffffff;
            --wf-gray-text: #5c5c5c;
            --wf-gray-label: #5e5e5e;
            --wf-bg-gradient-start: #9e95a7; 
            --wf-bg-gradient-mid: #dcd0d9;   
            --wf-bg-gradient-end: #fdfbf9;   
            --wf-card-shadow: 0 2px 6px rgba(0,0,0,0.08);
            --wf-btn-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, var(--wf-bg-gradient-start) 0%, var(--wf-bg-gradient-mid) 40%, var(--wf-bg-gradient-end) 100%);
            color: var(--wf-black);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding-bottom: 80px; 
        }

        .header { display: flex; justify-content: flex-end; align-items: center; padding: 0.8rem 1.25rem; height: 60px; }
        .header-actions { display: flex; align-items: center; gap: 1.25rem; }

        .notification-link {
            position: relative; background: none; border: none; cursor: pointer; color: #1a1a1a;
            padding: 4px; display: flex; align-items: center; justify-content: center; text-decoration: none;
        }

        .notification-badge {
            position: absolute; top: 1px; right: 1px; background-color: var(--wf-red); color: var(--wf-white);
            font-size: 0.65rem; font-weight: bold; width: 15px; height: 15px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.3);
        }

        .sign-off-link {
            display: flex; align-items: center; text-decoration: none; color: #1a1a1a;
            font-size: 0.85rem; gap: 0.3rem; font-weight: 600;
        }
        
        .sign-off-link svg { fill: #1a1a1a; }

        .main-content { padding: 0 1rem 1.5rem; }
        .greeting-section { margin-bottom: 1.5rem; margin-top: 0.5rem; padding-left: 0.25rem; }
        
        .greeting { font-size: 2.1rem; font-weight: 300; margin-bottom: 0.5rem; line-height: 1.2; color: #222; }

        .rewards-link { display: flex; align-items: center; text-decoration: none; color: #222; font-size: 1rem; font-weight: 400; }
        .rewards-link svg { margin-left: 0.4rem; color: #333; width: 18px; height: 18px; }

        .account-cards-container { display: flex; flex-direction: column; gap: 0.75rem; }
        .account-card { background-color: var(--wf-white); border-radius: 10px; padding: 1.1rem 1.25rem; box-shadow: var(--wf-card-shadow); }
        .account-header { font-size: 0.8rem; font-weight: 700; color: #000; text-transform: uppercase; margin-bottom: 0.25rem; letter-spacing: 0.3px; }
        .account-balance { font-size: 2.1rem; font-weight: 300; color: #000; line-height: 1.1; margin-bottom: 0.25rem; letter-spacing: -0.5px; }
        .balance-label { font-size: 0.85rem; color: var(--wf-gray-label); font-weight: 400; }

        .open-account-container { margin: 1.5rem 0 1.5rem; display: flex; justify-content: center; }
        .open-account-btn {
            background-color: var(--wf-white); border: none; border-radius: 25px; padding: 0.85rem 2.5rem;
            font-size: 1rem; font-weight: 600; text-align: center; color: #333; text-decoration: none;
            box-shadow: var(--wf-btn-shadow); cursor: pointer;
        }

        .promo-image { width: 100%; display: block; border-radius: 10px; box-shadow: var(--wf-card-shadow); margin-bottom: 1.5rem; }

        .fico-banner {
            background-color: var(--wf-white); border-radius: 12px; padding: 1rem 1.25rem;
            display: flex; align-items: center; box-shadow: var(--wf-card-shadow); margin-bottom: 1rem;
        }
        .fico-icon-container {
            margin-right: 1rem; display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; background-color: #eef0f4; border-radius: 50%; flex-shrink: 0;
        }
        .fico-icon { color: #666; }
        .fico-text { font-size: 0.95rem; color: #000; line-height: 1.35; font-weight: 400; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background-color: #fdfdfd;
            display: flex; justify-content: space-between; padding: 0.5rem 0.5rem 1rem; 
            box-shadow: 0 -1px 4px rgba(0,0,0,0.05); z-index: 100; border-top: 1px solid #eee;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
            color: #757575; font-size: 0.7rem; gap: 4px; font-weight: 500; width: 20%; padding-top: 4px;
        }
        .nav-item.active { color: #d71e28; }
        .nav-item svg { stroke-width: 1.5px; }
        .nav-item.active svg { fill: #d71e28; stroke: #d71e28; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-actions">
            <a href="transaction.html" class="notification-link" aria-label="Notifications">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="notification-badge">1</span>
            </a>
            
            <a href="index.html" class="sign-off-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C9.243 2 7 4.243 7 7v3H6c-1.103 0-2 .897-2 2v8c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-8c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zm0 2c1.654 0 3 1.346 3 3v3H9V7c0-1.654 1.346-3 3-3zm-4 7h8v8H8v-8zm4 2c-1.103 0-2 .897-2 2s.897 2 2 2 2-.897 2-2-.897-2-2-2z"/>
                </svg>
                Sign off
            </a>
        </div>
    </header>

    <main class="main-content">
        <section class="greeting-section">
            <h1 class="greeting" id="userGreeting">Good morning,<br>...</h1>
            <a href="#" class="rewards-link">
                Wells Fargo Rewards® $27.70 cash rewards
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>
        </section>

        <section class="account-cards-container" id="accountsContainer">
            <div class="account-card">
                <div class="account-header">Loading Accounts...</div>
            </div>
        </section>

        <div class="open-account-container">
            <a href="#" class="open-account-btn">Open a new account</a>
        </div>

        <img src="https://i.ibb.co/YFYf9nv3/IMG-4139.jpg" alt="Special Offer" class="promo-image">

        <section class="fico-banner">
            <div class="fico-icon-container">
                <svg class="fico-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path>
                    <path d="M12 16v.01"></path>
                </svg>
            </div>
            <div class="fico-text">
                Monitor your FICO® Score and credit report with Credit Close-Up℠
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            </svg>
            <span>Accounts</span>
        </a>
        <a href="#" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 19V5M5 12l7-7 7 7"/>
                <path d="M5 17l7 5 7-5"/>
            </svg>
            <span>Deposit</span>
        </a>
        <a href="transfer-page.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <text x="12" y="16" text-anchor="middle" font-size="16" font-weight="bold">$</text>
                <circle cx="12" cy="12" r="9"></circle>
            </svg>
            <span>Pay & Transfer</span>
        </a>
        <a href="#" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
            </svg>
            <span>Explore</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
            <span>Menu</span>
        </a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userId = sessionStorage.getItem('userId');
            
            // Redirect if not logged in
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            try {
                // Fetch User Data from Server
                const response = await fetch(`/api/user-data?userId=${userId}`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message);
                }

                // 1. Set Dynamic Greeting based on Real Time
                const hour = new Date().getHours();
                let timeGreeting = 'Good morning';
                if (hour >= 12 && hour < 17) timeGreeting = 'Good afternoon';
                if (hour >= 17) timeGreeting = 'Good evening';
                
                // Show Name
                document.getElementById('userGreeting').innerHTML = `${timeGreeting},<br>${data.user.firstName}`;

                // 2. Render Accounts (No Mock Data)
                const container = document.getElementById('accountsContainer');
                container.innerHTML = ''; 

                if (data.accounts.length === 0) {
                    container.innerHTML = '<div class="account-card"><div class="account-header">No Active Accounts</div></div>';
                } else {
                    data.accounts.forEach(acc => {
                        // Format last 4 digits
                        const last4 = acc.accountNumber.slice(-4);
                        // Format balance correctly
                        const balanceFormatted = acc.balance.toLocaleString('en-US', {
                            style: 'currency', 
                            currency: 'USD'
                        });

                        const card = document.createElement('div');
                        card.className = 'account-card';
                        card.innerHTML = `
                            <div class="account-header">${acc.accountName} ...${last4}</div>
                            <div class="account-balance">${balanceFormatted}</div>
                            <div class="balance-label">Available balance</div>
                        `;
                        container.appendChild(card);
                    });
                }

            } catch (err) {
                console.error('Error loading dashboard:', err);
                // Optional: Show a retry button or clearer error message if needed
            }
        });
    </script>
